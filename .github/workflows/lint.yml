name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unused-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint unused CSS classes
        run: bash scripts/lint-unused-css.sh

      - name: Lint unused components
        run: bash scripts/lint-unused-components.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.9.0"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .astro
          key: ${{ runner.OS }}-node-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.OS }}-node-

      - name: Install dependencies
        run: |
          npm install -g pnpm
          pnpm install

      - name: Run unit tests
        run: pnpm test
