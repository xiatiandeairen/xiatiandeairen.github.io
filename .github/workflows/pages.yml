name: pages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      discussions: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.9.0"
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .astro
          key: ${{ runner.OS }}-node-${{ hashFiles('**/package-lock.json', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.OS }}-node-
      
      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm
            pnpm install
          else
            npm install
          fi
      
      - name: Build
        env:
          # Used by src/integrations/fetch-giscus-comments.ts to query
          # GitHub Discussions at build time; without it, home hero cards
          # silently skip the "reader letters" block.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Search-engine verification meta tags are rendered only when these
          # are set (src/layouts/BaseLayout.astro reads import.meta.env.*).
          # Add them under repo Settings → Secrets → Actions once you've
          # registered the site in Search Console / Bing Webmaster.
          GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          BING_SITE_VERIFICATION: ${{ secrets.BING_SITE_VERIFICATION }}
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm build
          else
            npm run build
          fi
      
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
